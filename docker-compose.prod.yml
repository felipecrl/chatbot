# Production overrides — use together with the base file:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Adds a Caddy reverse proxy (automatic HTTPS) in front of the app and stops
# exposing PostgreSQL on the host.

services:
  postgres:
    ports: !reset []

  app:
    environment:
      NODE_ENV: production
      USE_MOCK_AI: 'false'
      SKIP_WHATSAPP_SEND: 'false'
    ports: !reset []

  caddy:
    image: caddy:2-alpine
    container_name: chatbot_caddy
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - chatbot_network

volumes:
  caddy_data:
    driver: local
  caddy_config:
    driver: local
