name: CI / CD

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Integração contínua ──────────────────────────────────────────────────────
  build:
    name: Lint · Type · Build · Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Type-check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  # ── Build e publicação da imagem Docker (só na main) ─────────────────────────
  publish:
    name: Build · Push → ghcr.io
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image: ${{ steps.image.outputs.name }}

    steps:
      - uses: actions/checkout@v4

      - name: Calcular nome da imagem (lowercase)
        id: image
        run: |
          NAME=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "name=${NAME}" >> "$GITHUB_OUTPUT"

      - name: Configurar QEMU (cross-compile ARM64)
        uses: docker/setup-qemu-action@v3

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build e push (linux/arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:latest
            ${{ steps.image.outputs.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy na Oracle VM ──────────────────────────────────────────────────────
  deploy:
    name: Deploy → Oracle VM
    needs: publish
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configurar SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ORACLE_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.ORACLE_VM_IP }}" >> ~/.ssh/known_hosts

      - name: Sincronizar arquivos de infraestrutura
        run: |
          rsync -az \
            --include='docker-compose.yml' \
            --include='docker-compose.prod.yml' \
            --include='Caddyfile' \
            --include='prisma/' \
            --include='prisma/**' \
            --exclude='*' \
            -e "ssh -i ~/.ssh/deploy_key" \
            . "${{ secrets.ORACLE_VM_USER }}@${{ secrets.ORACLE_VM_IP }}:~/whatsapp-chatbot-imobiliaria/"

      - name: Pull imagem e reiniciar containers
        env:
          IMAGE: ${{ needs.publish.outputs.image }}
          VM_USER: ${{ secrets.ORACLE_VM_USER }}
          VM_IP: ${{ secrets.ORACLE_VM_IP }}
        run: |
          ssh -i ~/.ssh/deploy_key "${VM_USER}@${VM_IP}" \
            "cd ~/whatsapp-chatbot-imobiliaria && \
             DOCKER_IMAGE=${IMAGE}:latest \
             docker compose -f docker-compose.yml -f docker-compose.prod.yml pull app && \
             DOCKER_IMAGE=${IMAGE}:latest \
             docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --remove-orphans 2>&1 | tail -30"

      - name: Verificar saúde da aplicação
        env:
          VM_USER: ${{ secrets.ORACLE_VM_USER }}
          VM_IP: ${{ secrets.ORACLE_VM_IP }}
        run: |
          ssh -i ~/.ssh/deploy_key "${VM_USER}@${VM_IP}" \
            'sleep 20 && \
             curl -sf http://localhost:3000/health | python3 -m json.tool && \
             echo "✓ Deploy concluído com sucesso"'
