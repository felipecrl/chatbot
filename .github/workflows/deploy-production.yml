name: Deploy → Production

on:
  push:
    branches: [main]

# Nunca cancela um deploy em andamento
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # ── CI final antes do deploy ────────────────────────────────────────────────
  ci:
    uses: ./.github/workflows/reusable-ci.yml
    with:
      docker-build: 'true'

  # ── Build e publicação da imagem Docker ─────────────────────────────────────
  publish:
    name: Build · Push → ghcr.io
    needs: ci
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      packages: write

    outputs:
      image: ${{ steps.image.outputs.name }}

    steps:
      - uses: actions/checkout@v4

      - name: Calcular nome da imagem (lowercase)
        id: image
        run: |
          NAME=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "name=${NAME}" >> "$GITHUB_OUTPUT"

      - name: Configurar QEMU (cross-compile multi-arch)
        uses: docker/setup-qemu-action@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build e push (linux/amd64 + linux/arm64)
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:latest
            ${{ steps.image.outputs.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy na Oracle VM ──────────────────────────────────────────────────────
  deploy:
    name: Deploy → Oracle VM (Production)
    needs: publish
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Configurar SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PROD_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.PROD_VM_IP }}" >> ~/.ssh/known_hosts

      - name: Sincronizar arquivos de infraestrutura
        run: |
          rsync -az \
            --include='docker-compose.yml' \
            --include='docker-compose.prod.yml' \
            --include='Caddyfile' \
            --include='prisma/' \
            --include='prisma/**' \
            --exclude='*' \
            -e "ssh -i ~/.ssh/deploy_key" \
            . "${{ secrets.PROD_VM_USER }}@${{ secrets.PROD_VM_IP }}:~/whatsapp-chatbot-imobiliaria/"

      - name: Guardar imagem anterior para rollback
        env:
          IMAGE: ${{ needs.publish.outputs.image }}
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.PROD_VM_USER }}@${{ secrets.PROD_VM_IP }}" \
            "cd ~/whatsapp-chatbot-imobiliaria && \
             PREVIOUS_IMAGE=\$(docker inspect --format='{{.Image}}' chatbot_imobiliaria_app 2>/dev/null || echo 'none') && \
             echo \$PREVIOUS_IMAGE > /tmp/previous_image.txt"

      - name: Pull imagem e reiniciar containers
        env:
          IMAGE: ${{ needs.publish.outputs.image }}
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.PROD_VM_USER }}@${{ secrets.PROD_VM_IP }}" \
            "cd ~/whatsapp-chatbot-imobiliaria && \
             DOCKER_IMAGE=${IMAGE}:${{ github.sha }} \
             docker compose -f docker-compose.yml -f docker-compose.prod.yml pull app && \
             DOCKER_IMAGE=${IMAGE}:${{ github.sha }} \
             docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --remove-orphans 2>&1 | tail -30"

      - name: Verificar saúde da aplicação (com rollback automático)
        run: |
          ssh -i ~/.ssh/deploy_key "${{ secrets.PROD_VM_USER }}@${{ secrets.PROD_VM_IP }}" '
            echo "Aguardando app inicializar..."
            for i in $(seq 1 10); do
              STATUS=$(docker inspect --format="{{.State.Health.Status}}" chatbot_imobiliaria_app 2>/dev/null || echo "not_found")
              if [ "$STATUS" = "healthy" ]; then
                echo "✓ Deploy concluído com sucesso (tentativa ${i})"
                exit 0
              fi
              echo "  tentativa ${i}/10 — status: ${STATUS} — aguardando 10s..."
              sleep 10
            done

            echo "✗ Health check falhou após 100s. Iniciando rollback automático..."
            cd ~/whatsapp-chatbot-imobiliaria
            docker compose -f docker-compose.yml -f docker-compose.prod.yml logs --tail=50 app

            # Rollback: voltar para a imagem anterior
            PREVIOUS_IMAGE=$(cat /tmp/previous_image.txt 2>/dev/null || echo "none")
            if [ "$PREVIOUS_IMAGE" != "none" ] && [ -n "$PREVIOUS_IMAGE" ]; then
              echo "Restaurando imagem anterior: $PREVIOUS_IMAGE"
              docker compose -f docker-compose.yml -f docker-compose.prod.yml down
              docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --remove-orphans 2>&1 | tail -20

              # Aguardar rollback container ficar saudável
              for j in $(seq 1 5); do
                ROLLBACK_STATUS=$(docker inspect --format="{{.State.Health.Status}}" chatbot_imobiliaria_app 2>/dev/null || echo "not_found")
                if [ "$ROLLBACK_STATUS" = "healthy" ]; then
                  echo "⚠ Rollback bem-sucedido. Container anterior restaurado."
                  exit 1
                fi
                sleep 10
              done
              echo "⚠ Rollback não confirmou saúde. Verifique manualmente."
              exit 1
            else
              echo "⚠ Sem imagem anterior para rollback. Falha crítica."
              exit 1
            fi
          '
