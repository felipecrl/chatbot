version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: chatbot_imobiliaria_db
    environment:
      POSTGRES_USER: chatbot_user
      POSTGRES_PASSWORD: chatbot_secure_password_123
      POSTGRES_DB: chatbot_imobiliaria
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatbot_user -d chatbot_imobiliaria"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - chatbot_network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chatbot_imobiliaria_app
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://chatbot_user:chatbot_secure_password_123@postgres:5432/chatbot_imobiliaria
      PORT: 3000
      WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID}
      WHATSAPP_VERIFY_TOKEN: ${WHATSAPP_VERIFY_TOKEN}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
      SR_PROPRIETARIO_API_URL: ${SR_PROPRIETARIO_API_URL}
      SR_PROPRIETARIO_API_KEY: ${SR_PROPRIETARIO_API_KEY}
      IMOVIEW_API_URL: ${IMOVIEW_API_URL}
      IMOVIEW_API_KEY: ${IMOVIEW_API_KEY}
      IMOVIEW_EMPRESA_ID: ${IMOVIEW_EMPRESA_ID}
      EMPRESA_NOME: ${EMPRESA_NOME:-Minha Imobiliária}
      EMPRESA_CIDADE: ${EMPRESA_CIDADE:-Belo Horizonte}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - chatbot_network
    volumes:
      - .:/app
      - /app/node_modules

volumes:
  postgres_data:
    driver: local

networks:
  chatbot_network:
    driver: bridge
