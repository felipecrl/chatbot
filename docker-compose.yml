services:
  postgres:
    image: postgres:16-alpine
    container_name: chatbot_imobiliaria_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-chatbot_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chatbot_password}
      POSTGRES_DB: ${POSTGRES_DB:-chatbot_imobiliaria}
      POSTGRES_INITDB_ARGS: '--encoding=UTF8'
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER:-chatbot_user} -d ${POSTGRES_DB:-chatbot_imobiliaria}',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - chatbot_network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chatbot_imobiliaria_app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-chatbot_user}:${POSTGRES_PASSWORD:-chatbot_password}@postgres:5432/${POSTGRES_DB:-chatbot_imobiliaria}
    ports:
      - '${PORT:-3000}:3000'
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - chatbot_network

volumes:
  postgres_data:
    driver: local

networks:
  chatbot_network:
    driver: bridge
